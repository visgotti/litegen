models:
  - id: google/imagen-3
    provider: google
    media_type: image
    display_name: Imagen 3
    description: Google Imagen 3 (imagen-3.0-generate-002) via the Imagen :predict API.
    pricing: { base_cost_usd: 0.04 }
    capabilities: { text_to_image: true }
    prompt: { required: true, max_length: 4000 }
    params:
      negative_prompt: { kind: string, max_length: 4000 }
      seed: { kind: seed, min: 0, max: 2147483647 }
      aspect_ratio:
        kind: aspect_ratio
        allowed: ["1:1","9:16","16:9","3:4","4:3"]
        default: "1:1"
    extra_allowlist: [personGeneration]
    tags: [text-to-image]

  - id: google/gemini-2.5-flash-image
    provider: google
    media_type: image
    display_name: Gemini 2.5 Flash (image)
    description: Gemini 2.5 Flash image generation.
    pricing: { base_cost_usd: 0.02 }
    capabilities: { text_to_image: true, image_to_image: true }
    prompt: { required: true, max_length: 4000 }
    params:
      aspect_ratio:
        kind: aspect_ratio
        allowed: ["1:1","16:9","9:16","4:3","3:4"]
    ref_inputs:
      max_total: 1
      default_role: init
      provider_format: { form: base64 }
      roles:
        init: { required: false, min_count: 0, max_count: 1 }
    extra_allowlist: []
    tags: [text-to-image, image-to-image]

  - id: google/gemini-3-pro-image
    provider: google
    media_type: image
    display_name: Gemini 3 Pro (image)
    description: Gemini 3 Pro image generation.
    pricing: { base_cost_usd: 0.05 }
    capabilities: { text_to_image: true, image_to_image: true }
    prompt: { required: true, max_length: 8000 }
    params:
      aspect_ratio:
        kind: aspect_ratio
        allowed: ["1:1","16:9","9:16","4:3","3:4","21:9","9:21"]
    ref_inputs:
      max_total: 3
      default_role: init
      provider_format: { form: base64 }
      roles:
        init: { required: false, min_count: 0, max_count: 3 }
    extra_allowlist: []
    tags: [text-to-image, image-to-image, multi-ref]

  # ─── Veo (video) ──────────────────────────────────────────────────────────
  # Gemini Developer API. Async: :predictLongRunning -> poll operation.
  # Refs are base64 inline only (the Developer API does not accept input URLs).
  - id: google/veo-3.0-generate-001
    provider: google
    media_type: video
    display_name: Veo 3
    description: Google Veo 3 text-to-video and image-to-video (with audio).
    pricing: { base_cost_usd: 3.20 }   # ~$0.40/s x 8s
    capabilities: { text_to_video: true, image_to_video: true }
    prompt: { required: true, max_length: 4000 }
    params:
      duration_seconds: { kind: float, min: 4.0, max: 8.0, default: 8.0 }
      aspect_ratio:
        kind: aspect_ratio
        allowed: ["16:9","9:16"]
        default: "16:9"
      resolution:
        kind: string
        enum_values: [720p, 1080p]
    ref_inputs:
      max_total: 2
      default_role: first_frame
      provider_format: { form: base64 }
      roles:
        first_frame: { required: false, min_count: 0, max_count: 1 }
        last_frame:  { required: false, min_count: 0, max_count: 1 }
    extra_allowlist: [personGeneration, negativePrompt]
    tags: [text-to-video, image-to-video]

  - id: google/veo-3.0-fast-generate-001
    provider: google
    media_type: video
    display_name: Veo 3 Fast
    description: Faster, cheaper Veo 3 variant.
    pricing: { base_cost_usd: 0.80 }   # ~$0.10/s x 8s (720p)
    capabilities: { text_to_video: true, image_to_video: true }
    prompt: { required: true, max_length: 4000 }
    params:
      duration_seconds: { kind: float, min: 4.0, max: 8.0, default: 8.0 }
      aspect_ratio:
        kind: aspect_ratio
        allowed: ["16:9","9:16"]
        default: "16:9"
      resolution:
        kind: string
        enum_values: [720p, 1080p]
    ref_inputs:
      max_total: 2
      default_role: first_frame
      provider_format: { form: base64 }
      roles:
        first_frame: { required: false, min_count: 0, max_count: 1 }
        last_frame:  { required: false, min_count: 0, max_count: 1 }
    extra_allowlist: [personGeneration, negativePrompt]
    tags: [text-to-video, image-to-video, fast]

  - id: google/veo-2.0-generate-001
    provider: google
    media_type: video
    display_name: Veo 2
    description: Google Veo 2 text-to-video and image-to-video.
    pricing: { base_cost_usd: 2.80 }   # ~$0.35/s x 8s
    capabilities: { text_to_video: true, image_to_video: true }
    prompt: { required: true, max_length: 4000 }
    params:
      duration_seconds: { kind: float, min: 4.0, max: 8.0, default: 8.0 }
      aspect_ratio:
        kind: aspect_ratio
        allowed: ["16:9","9:16"]
        default: "16:9"
    ref_inputs:
      max_total: 2
      default_role: first_frame
      provider_format: { form: base64 }
      roles:
        first_frame: { required: false, min_count: 0, max_count: 1 }
        last_frame:  { required: false, min_count: 0, max_count: 1 }
    extra_allowlist: [personGeneration, negativePrompt]
    tags: [text-to-video, image-to-video]

  - id: google/veo-3.1-generate-preview
    provider: google
    media_type: video
    display_name: Veo 3.1 (preview)
    description: Veo 3.1 preview — adds reference images and richer control. Paid-tier, preview model id (subject to change).
    pricing: { base_cost_usd: 3.20 }
    capabilities: { text_to_video: true, image_to_video: true }
    prompt: { required: true, max_length: 4000 }
    params:
      duration_seconds: { kind: float, min: 4.0, max: 8.0, default: 8.0 }
      aspect_ratio:
        kind: aspect_ratio
        allowed: ["16:9","9:16"]
        default: "16:9"
      resolution:
        kind: string
        enum_values: [720p, 1080p, 4k]
    ref_inputs:
      max_total: 2
      default_role: first_frame
      provider_format: { form: base64 }
      roles:
        first_frame: { required: false, min_count: 0, max_count: 1 }
        last_frame:  { required: false, min_count: 0, max_count: 1 }
    extra_allowlist: [personGeneration, negativePrompt]
    tags: [text-to-video, image-to-video, preview]
