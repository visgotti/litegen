models:
  # Black Forest Labs (FLUX) direct API. Async: POST /v1/{model} -> poll polling_url.
  # Auth: x-key header. Image-only. width/height 256-1440 (mult of 32).
  - id: bfl/flux-pro-1.1
    provider: bfl
    media_type: image
    display_name: FLUX 1.1 [pro]
    description: Black Forest Labs FLUX 1.1 pro text-to-image (Redux image_prompt ref).
    pricing: { base_cost_usd: 0.04 }
    capabilities: { text_to_image: true, image_to_image: true }
    prompt: { required: true, max_length: 10000 }
    params:
      seed: { kind: seed, min: 0, max: 4294967294 }
      size:
        kind: size
        mode: freeform
        min_width: 256
        max_width: 1440
        min_height: 256
        max_height: 1440
        multiple_of: 32
    ref_inputs:
      max_total: 1
      default_role: redux
      provider_format: { form: base64 }
      roles:
        redux: { required: false, min_count: 0, max_count: 1 }
    extra_allowlist: [output_format, prompt_upsampling, safety_tolerance]
    tags: [text-to-image]

  - id: bfl/flux-pro
    provider: bfl
    media_type: image
    display_name: FLUX [pro]
    description: Black Forest Labs FLUX pro text-to-image.
    pricing: { base_cost_usd: 0.05 }
    capabilities: { text_to_image: true }
    prompt: { required: true, max_length: 10000 }
    params:
      seed: { kind: seed, min: 0, max: 4294967294 }
      size:
        kind: size
        mode: freeform
        min_width: 256
        max_width: 1440
        min_height: 256
        max_height: 1440
        multiple_of: 32
    extra_allowlist: [output_format, prompt_upsampling, safety_tolerance]
    tags: [text-to-image]

  - id: bfl/flux-dev
    provider: bfl
    media_type: image
    display_name: FLUX.1 [dev]
    description: Black Forest Labs FLUX.1 dev (hosted) text-to-image.
    pricing: { base_cost_usd: 0.025 }
    capabilities: { text_to_image: true }
    prompt: { required: true, max_length: 10000 }
    params:
      seed: { kind: seed, min: 0, max: 4294967294 }
      size:
        kind: size
        mode: freeform
        min_width: 256
        max_width: 1440
        min_height: 256
        max_height: 1440
        multiple_of: 32
    extra_allowlist: [output_format, prompt_upsampling, safety_tolerance, steps, guidance]
    tags: [text-to-image]

  - id: bfl/flux-pro-1.1-ultra
    provider: bfl
    media_type: image
    display_name: FLUX 1.1 [pro] Ultra
    description: FLUX 1.1 pro Ultra — high-resolution, aspect-ratio based.
    pricing: { base_cost_usd: 0.06 }
    capabilities: { text_to_image: true }
    prompt: { required: true, max_length: 10000 }
    params:
      seed: { kind: seed, min: 0, max: 4294967294 }
      aspect_ratio:
        kind: aspect_ratio
        allowed: ["21:9","16:9","4:3","1:1","3:4","9:16","9:21"]
        default: "16:9"
    extra_allowlist: [output_format, raw, safety_tolerance]
    tags: [text-to-image]

  - id: bfl/flux-kontext-pro
    provider: bfl
    media_type: image
    display_name: FLUX.1 Kontext [pro]
    description: FLUX.1 Kontext image editing (input_image base64 or URL).
    pricing: { base_cost_usd: 0.04 }
    capabilities: { text_to_image: true, image_to_image: true }
    prompt: { required: true, max_length: 10000 }
    params:
      seed: { kind: seed, min: 0, max: 4294967294 }
      aspect_ratio:
        kind: aspect_ratio
        allowed: ["21:9","16:9","4:3","1:1","3:4","9:16","9:21"]
    ref_inputs:
      max_total: 1
      default_role: init
      provider_format: { form: base64 }
      roles:
        init: { required: false, min_count: 0, max_count: 1 }
    extra_allowlist: [output_format, safety_tolerance]
    tags: [text-to-image, image-to-image, editing]

  - id: bfl/flux-kontext-max
    provider: bfl
    media_type: image
    display_name: FLUX.1 Kontext [max]
    description: FLUX.1 Kontext max image editing.
    pricing: { base_cost_usd: 0.08 }
    capabilities: { text_to_image: true, image_to_image: true }
    prompt: { required: true, max_length: 10000 }
    params:
      seed: { kind: seed, min: 0, max: 4294967294 }
      aspect_ratio:
        kind: aspect_ratio
        allowed: ["21:9","16:9","4:3","1:1","3:4","9:16","9:21"]
    ref_inputs:
      max_total: 1
      default_role: init
      provider_format: { form: base64 }
      roles:
        init: { required: false, min_count: 0, max_count: 1 }
    extra_allowlist: [output_format, safety_tolerance]
    tags: [text-to-image, image-to-image, editing]
