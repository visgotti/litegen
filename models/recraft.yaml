models:
  # Recraft (external.api.recraft.ai/v1). Sync, OpenAI-compatible. Bearer auth.
  # `style` selects the recraft style family (V2/V3 only); `size` is an enumerated
  # set of WxH pairs that Recraft documents as supported (freeform pixel sizes are
  # rejected upstream).
  - id: recraft/recraftv3
    provider: recraft
    media_type: image
    display_name: Recraft V3
    description: Recraft V3 raster image generation.
    pricing: { base_cost_usd: 0.04 }
    capabilities: { text_to_image: true }
    prompt: { required: true, max_length: 1000 }
    params:
      negative_prompt: { kind: string, max_length: 1000 }
      style:
        kind: string
        enum_values: [realistic_image, digital_illustration, vector_illustration, icon, any]
        default: realistic_image
      size:
        kind: size
        mode: enum
        values: [[1024,1024],[1365,1024],[1024,1365],[1536,1024],[1024,1536],[1024,1280],[1280,1024],[1024,1707],[1707,1024],[1434,1024],[1024,1434],[1024,2048],[2048,1024]]
    extra_allowlist: [style_id, controls, text_layout, substyle]
    tags: [text-to-image]

  - id: recraft/recraftv3_vector
    provider: recraft
    media_type: image
    display_name: Recraft V3 Vector
    description: Recraft V3 vector (SVG) image generation.
    pricing: { base_cost_usd: 0.08 }
    capabilities: { text_to_image: true }
    prompt: { required: true, max_length: 1000 }
    params:
      negative_prompt: { kind: string, max_length: 1000 }
      style:
        kind: string
        enum_values: [vector_illustration, icon]
        default: vector_illustration
      size:
        kind: size
        mode: enum
        values: [[1024,1024],[1365,1024],[1024,1365],[1536,1024],[1024,1536],[1024,1280],[1280,1024],[1024,1707],[1707,1024],[1434,1024],[1024,1434],[1024,2048],[2048,1024]]
    extra_allowlist: [style_id, controls, substyle]
    tags: [text-to-image, vector]

