    display_name: Recraft V3 Vector
    description: Recraft V3 vector (SVG) image generation.
    pricing: { base_cost_usd: 0.08 }
    capabilities: { text_to_image: true }
    prompt: { required: true, max_length: 1000 }
    params:
      negative_prompt: { kind: string, max_length: 1000 }
      style:
        kind: string
        enum_values: [vector_illustration, icon]
        default: vector_illustration
      size:
        kind: size
        mode: freeform
        min_width: 1024
        max_width: 2048
        min_height: 1024
        max_height: 2048
    extra_allowlist: [style_id, controls, substyle]
    tags: [text-to-image, vector]

