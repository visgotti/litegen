models:
  # Recraft (external.api.recraft.ai/v1). Sync, OpenAI-compatible. Bearer auth.
  # `style` selects the recraft style family; `size` is WxH (1024-2048).
  - id: recraft/recraftv3
    provider: recraft
    media_type: image
    display_name: Recraft V3
    description: Recraft V3 raster image generation.
    pricing: { base_cost_usd: 0.04 }
    capabilities: { text_to_image: true }
    prompt: { required: true, max_length: 1000 }
    params:
      negative_prompt: { kind: string, max_length: 1000 }
      style:
        kind: string
        enum_values: [realistic_image, digital_illustration, vector_illustration, icon, any]
        default: realistic_image
      size:
        kind: size
        mode: freeform
        min_width: 1024
        max_width: 2048
        min_height: 1024
        max_height: 2048
    extra_allowlist: [style_id, controls, text_layout, substyle]
    tags: [text-to-image]

  - id: recraft/recraftv3_vector
