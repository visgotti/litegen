models:
  # Kling (api.klingai.com; regional hosts via api_base). Auth: per-request JWT
  # (HS256) from access_key (key_id) + secret_key (key_secret). Async tasks.
  # ─── Image (Kolors) ───────────────────────────────────────────────────────
  - id: kling/kling-v2
    provider: kling
    media_type: image
    display_name: Kling Image v2
    description: Kling (Kolors) text-to-image + subject reference.
    pricing: { base_cost_usd: 0.04 }
    capabilities: { text_to_image: true, image_to_image: true }
    prompt: { required: true, max_length: 2500 }
    params:
      negative_prompt: { kind: string, max_length: 2500 }
      aspect_ratio:
        kind: aspect_ratio
        allowed: ["16:9","9:16","1:1","4:3","3:4","3:2","2:3"]
        default: "1:1"
    ref_inputs:
      max_total: 1
      default_role: subject
      provider_format: { form: base64 }
      roles:
        subject: { required: false, min_count: 0, max_count: 1 }
    extra_allowlist: [image_fidelity, image_reference]
    tags: [text-to-image, image-to-image]

  - id: kling/kling-v1-5
    provider: kling
    media_type: image
    display_name: Kling Image v1.5
    description: Kling (Kolors) v1.5 text-to-image.
    pricing: { base_cost_usd: 0.035 }
    capabilities: { text_to_image: true }
    prompt: { required: true, max_length: 2500 }
    params:
      negative_prompt: { kind: string, max_length: 2500 }
      aspect_ratio:
        kind: aspect_ratio
        allowed: ["16:9","9:16","1:1","4:3","3:4","3:2","2:3"]
        default: "1:1"
    extra_allowlist: [image_fidelity]
    tags: [text-to-image]

  # ─── Video ────────────────────────────────────────────────────────────────
  - id: kling/video-kling-v2-1
    provider: kling
    media_type: video
    display_name: Kling Video v2.1
    description: Kling v2.1 text/image-to-video (first frame + image_tail last frame).
    pricing: { base_cost_usd: 1.00 }
    capabilities: { text_to_video: true, image_to_video: true }
    prompt: { required: true, max_length: 2500 }
    params:
      negative_prompt: { kind: string, max_length: 2500 }
      duration_seconds: { kind: float, min: 5.0, max: 10.0, default: 5.0 }
      aspect_ratio:
        kind: aspect_ratio
        allowed: ["16:9","9:16","1:1"]
        default: "16:9"
    ref_inputs:
      max_total: 2
      default_role: first_frame
      provider_format: { form: base64 }
      roles:
        first_frame: { required: false, min_count: 0, max_count: 1 }
        last_frame:  { required: false, min_count: 0, max_count: 1 }
    extra_allowlist: [cfg_scale, mode, camera_control]
    tags: [text-to-video, image-to-video]

  - id: kling/video-kling-v1-6
    provider: kling
    media_type: video
    display_name: Kling Video v1.6
    description: Kling v1.6 text/image-to-video.
    pricing: { base_cost_usd: 0.50 }
    capabilities: { text_to_video: true, image_to_video: true }
    prompt: { required: true, max_length: 2500 }
    params:
      negative_prompt: { kind: string, max_length: 2500 }
      duration_seconds: { kind: float, min: 5.0, max: 10.0, default: 5.0 }
      aspect_ratio:
        kind: aspect_ratio
        allowed: ["16:9","9:16","1:1"]
        default: "16:9"
    ref_inputs:
      max_total: 2
      default_role: first_frame
      provider_format: { form: base64 }
      roles:
        first_frame: { required: false, min_count: 0, max_count: 1 }
        last_frame:  { required: false, min_count: 0, max_count: 1 }
    extra_allowlist: [cfg_scale, mode, camera_control]
    tags: [text-to-video, image-to-video]
