version: "3.9"
services:
  litegen:
    build: .
    image: litegen:latest
    ports:
      - "4000:4000"
    environment:
      LITEGEN__SERVER__HOST: "0.0.0.0"
      LITEGEN__SERVER__PORT: "4000"
      LITEGEN__DATABASE_URL: "postgres://litegen:litegen@db:5432/litegen"
      LITEGEN__MASTER_KEY: "${LITEGEN_MASTER_KEY:?LITEGEN_MASTER_KEY must be set}"
      LITEGEN_CORS_ORIGINS: "${LITEGEN_CORS_ORIGINS:-}"
      RUST_LOG: "info"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: litegen
      POSTGRES_PASSWORD: litegen
      POSTGRES_DB: litegen
    volumes:
      - litegen_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litegen"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  litegen_db:
