# Web tier: Caddy terminates TLS (automatic Let's Encrypt) and serves BOTH
#   litegen.ai      → static Next.js landing export (/srv/landing)
#   app.litegen.ai  → dashboard SPA (/srv/app) + the API reverse-proxied under /api
# Layered on top of docker-compose.prod.yml (same compose project = shared network),
# so `web` can reach the `litegen` service by name. Brought up via:
#   docker compose -f docker-compose.prod.yml -f docker-compose.web.yml --env-file .env up -d
services:
  web:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./landing-dist:/srv/landing:ro
      - ./dashboard-dist:/srv/app:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - litegen
volumes:
  caddy_data:
  caddy_config:
