# Production compose for the LiteGen hosted droplet.
# deploy.js writes this file + a sibling `.env` (the substitution source) to
# /opt/litegen on the droplet, then runs `docker compose pull && up -d`.
# The litegen image is built off-box (buildx amd64) and pulled from GHCR.
services:
  litegen:
    image: ${LITEGEN_IMAGE:?LITEGEN_IMAGE must be set}
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      LITEGEN__SERVER__HOST: "0.0.0.0"
      LITEGEN__SERVER__PORT: "4000"
      LITEGEN__DATABASE_URL: "postgres://litegen:${POSTGRES_PASSWORD}@db:5432/litegen"
      LITEGEN__MASTER_KEY: "${LITEGEN__MASTER_KEY:?LITEGEN__MASTER_KEY must be set}"
      LITEGEN_CORS_ORIGINS: "${LITEGEN_CORS_ORIGINS:-}"
      # Hosted multi-tenant mode (defaults to single_tenant when unset).
      LITEGEN__MODE: "${LITEGEN__MODE:-single_tenant}"
      LITEGEN__SECRETS_KEY: "${LITEGEN__SECRETS_KEY:-}"
      LITEGEN__COOKIE_INSECURE_DEV: "${LITEGEN__COOKIE_INSECURE_DEV:-}"
      # OAuth-only auth (Google + GitHub; no password) for the hosted platform.
      LITEGEN__AUTH__ALLOW_PASSWORD: "${LITEGEN__AUTH__ALLOW_PASSWORD:-true}"
      LITEGEN__OAUTH__CALLBACK_BASE: "${LITEGEN__OAUTH__CALLBACK_BASE:-}"
      LITEGEN__OAUTH__GOOGLE__CLIENT_ID: "${LITEGEN__OAUTH__GOOGLE__CLIENT_ID:-}"
      LITEGEN__OAUTH__GOOGLE__CLIENT_SECRET: "${LITEGEN__OAUTH__GOOGLE__CLIENT_SECRET:-}"
      LITEGEN__OAUTH__GITHUB__CLIENT_ID: "${LITEGEN__OAUTH__GITHUB__CLIENT_ID:-}"
      LITEGEN__OAUTH__GITHUB__CLIENT_SECRET: "${LITEGEN__OAUTH__GITHUB__CLIENT_SECRET:-}"
      # Object storage: Scaleway S3 for generated-image artifacts (S3-compatible).
      LITEGEN__IMAGE_STORAGE__BACKEND: "${LITEGEN__IMAGE_STORAGE__BACKEND:-local}"
      LITEGEN_S3_BUCKET: "${LITEGEN_S3_BUCKET:-}"
      LITEGEN_S3_REGION: "${LITEGEN_S3_REGION:-}"
      LITEGEN_S3_ENDPOINT_URL: "${LITEGEN_S3_ENDPOINT_URL:-}"
      LITEGEN_S3_ACCESS_KEY_ID: "${LITEGEN_S3_ACCESS_KEY_ID:-}"
      LITEGEN_S3_SECRET_ACCESS_KEY: "${LITEGEN_S3_SECRET_ACCESS_KEY:-}"
      # Optional provider keys — passed through from .env.deploy when present.
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      REPLICATE_API_TOKEN: "${REPLICATE_API_TOKEN:-}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
      FAL_KEY: "${FAL_KEY:-}"
      RUST_LOG: "info"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: litegen
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}"
      POSTGRES_DB: litegen
    volumes:
      - litegen_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litegen"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  litegen_db:
