# Serves the LiteGen dashboard SPA on :80 and reverse-proxies the API to the
# litegen container, so the dashboard + API share one origin (http://<droplet-ip>/).
# Same-origin keeps session cookies + CSRF working without CORS.
server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API + health + misc → litegen container (same docker network) ──
    location /v1/          { proxy_pass http://litegen:4000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location = /health     { proxy_pass http://litegen:4000; }
    location /health/      { proxy_pass http://litegen:4000; }
    location = /metrics    { proxy_pass http://litegen:4000; }
    location = /openapi.json { proxy_pass http://litegen:4000; }
    location /mock/        { proxy_pass http://litegen:4000; }

    # ── SPA: everything else falls back to index.html ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}
