# Serves the LiteGen dashboard SPA and reverse-proxies the API under /api on the
# app host (app.litegen.ai). Same-origin (dashboard + API on one host) keeps
# session cookies + CSRF working without CORS. TLS is terminated at Cloudflare
# (proxied); this origin listens on :80 (and :443 when an origin cert is installed).
server {
    listen 80 default_server;
    server_name app.litegen.ai _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API under /api → litegen container, stripping the /api prefix ──
    # /api/v1/...           -> litegen /v1/...
    # /api/auth/redirect    -> litegen /auth/redirect   (unified OAuth callback)
    # /api/health/live etc. -> litegen /health/live
    location /api/ {
        proxy_pass http://litegen:4000/;   # trailing slash strips the /api/ prefix
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SPA: everything else serves the dashboard, falling back to index.html ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}
